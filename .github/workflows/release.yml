# Baut bei einem Versions-Tag (z. B. v0.3.2) eine EINZELNE portable Windows-.exe und hängt sie an ein
# GitHub-Release. Läuft auf windows-latest → das portable-Target baut nativ OHNE wine. Auch manuell
# auslösbar (workflow_dispatch) für einen Testlauf ohne Tag.
#
# Hintergrund: lokal baut `npm run package:win` ein wine-freies ZIP (Linux/WSL, ADR-0006). Eine einzelne
# .exe (portable-Target) braucht auf Linux wine — daher hier auf einem echten Windows-Runner.

name: Release (Windows portable)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write            # nötig, damit der Job ein Release anlegen darf

env:
  # Node-20-Actions (checkout/setup-node/upload-artifact) werden ab 16.06.2026 zwangsweise auf Node 24
  # migriert → jetzt opt-in, um die Deprecation-Warnung loszuwerden (GitHub-Hinweis). Major-Tags der
  # Actions bei Verfügbarkeit (v5) anheben.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      # win-paste.exe (Win32-Helfer, native/win-paste/win-paste.c) mit MinGW kompilieren — entspricht
      # native/win-paste/build.sh, nur auf Windows. Die .exe ist gitignored (Bauartefakt) → hier erzeugt.
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
      - name: win-paste.exe bauen
        shell: msys2 {0}
        run: |
          gcc -O2 -mwindows native/win-paste/win-paste.c -o resources/win-paste.exe -luser32
          file resources/win-paste.exe

      - name: App-Bundle bauen (electron-vite → out/)
        run: npm run build

      # Einzelne portable .exe. --win portable überschreibt das zip-Target aus electron-builder.yml
      # nur für diesen CI-Lauf. npmRebuild:false + uiohook-Prebuilds → kein nativer Rebuild.
      - name: Portable .exe paketieren
        run: npx electron-builder --win portable

      - name: Artefakt hochladen (immer, auch bei manuellem Lauf)
        uses: actions/upload-artifact@v4
        with:
          name: Blitztext-windows-portable
          path: release/*.exe
          if-no-files-found: error

      # Bei einem Tag-Push zusätzlich ein GitHub-Release mit der .exe als Download-Asset.
      - name: Release veröffentlichen (nur bei Tag)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release/*.exe \
            --title "$GITHUB_REF_NAME" \
            --notes "Portable Windows-Build (unsigniert). Beim ersten Start kann Windows SmartScreen einen Hinweis zeigen — über „Weitere Informationen“ → „Trotzdem ausführen“."
